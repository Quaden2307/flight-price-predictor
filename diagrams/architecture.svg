<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="960" height="620" fill="#fafafa"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-fallback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Flight Price Predictor — Architecture</text>

  <rect x="380" y="80" width="200" height="56" rx="10" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">External Pricing API</text>
  <text x="480" y="124" text-anchor="middle" font-size="11" fill="#78350f">live source of flight prices</text>

  <rect x="60" y="200" width="180" height="60" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="150" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">Data Collector</text>
  <text x="150" y="245" text-anchor="middle" font-size="11" fill="#4338ca">fetches and stores history</text>

  <rect x="350" y="190" width="280" height="100" rx="10" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="490" y="218" text-anchor="middle" font-size="14" font-weight="700" fill="#065f46">Backend</text>
  <text x="490" y="240" text-anchor="middle" font-size="11" fill="#047857">predicts price using the model,</text>
  <text x="490" y="258" text-anchor="middle" font-size="11" fill="#047857">compares to current real price,</text>
  <text x="490" y="276" text-anchor="middle" font-size="11" fill="#047857">recommends buy now or wait</text>

  <rect x="740" y="200" width="160" height="60" rx="10" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <text x="820" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">User Browser</text>
  <text x="820" y="245" text-anchor="middle" font-size="11" fill="#1e3a8a">search + results</text>

  <rect x="60" y="380" width="180" height="60" rx="10" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="150" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#991b1b">flights.db</text>
  <text x="150" y="425" text-anchor="middle" font-size="11" fill="#991b1b">historical prices</text>

  <rect x="380" y="380" width="200" height="60" rx="10" fill="#fce7f3" stroke="#9f1239" stroke-width="2"/>
  <text x="480" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#9f1239">Trained Model</text>
  <text x="480" y="425" text-anchor="middle" font-size="11" fill="#9f1239">predicts from features</text>

  <rect x="740" y="380" width="160" height="60" rx="10" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="820" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Booking Site</text>
  <text x="820" y="425" text-anchor="middle" font-size="11" fill="#78350f">where users book</text>

  <path d="M 410 136 Q 280 168, 215 200" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="160" font-size="12" font-style="italic" fill="#374151">historical data</text>

  <path d="M 490 136 L 490 190" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="500" y="170" font-size="12" font-style="italic" fill="#374151">live current price</text>

  <path d="M 150 260 L 150 380" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="160" y="325" font-size="12" font-style="italic" fill="#374151">stores</text>

  <path d="M 240 410 Q 320 410, 380 410" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="402" font-size="12" font-style="italic" fill="#374151">trains</text>

  <path d="M 480 380 L 480 290" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrow-dim)"/>
  <text x="490" y="340" font-size="12" font-style="italic" fill="#6b7280">used by backend</text>

  <path d="M 740 220 L 630 220" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="650" y="212" font-size="12" font-style="italic" fill="#374151">request</text>

  <path d="M 630 245 L 740 245" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="660" y="262" font-size="12" font-style="italic" fill="#374151">result</text>

  <path d="M 820 260 L 820 380" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="830" y="325" font-size="12" font-style="italic" fill="#374151">books flight</text>

  <path d="M 350 270 Q 270 320, 240 380" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="5,4" fill="none" marker-end="url(#arrow-fallback)"/>
  <text x="245" y="335" font-size="12" font-weight="700" fill="#dc2626">fallback</text>
  <text x="220" y="350" font-size="10" font-style="italic" fill="#dc2626">when live API fails</text>

  <g transform="translate(280, 560)">
    <line x1="0" y1="10" x2="30" y2="10" stroke="#374151" stroke-width="2"/>
    <text x="38" y="14" font-size="11" fill="#374151">primary flow</text>

    <line x1="140" y1="10" x2="170" y2="10" stroke="#9ca3af" stroke-width="2" stroke-dasharray="4,4"/>
    <text x="178" y="14" font-size="11" fill="#374151">supporting</text>

    <line x1="270" y1="10" x2="300" y2="10" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="5,4"/>
    <text x="308" y="14" font-size="11" fill="#dc2626" font-weight="700">fallback</text>
  </g>
</svg>
